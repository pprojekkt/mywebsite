<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>i got you</title>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0e1218;
    }

    body { font-family: 'Cormorant Garamond', serif; }

    body {
      opacity: 1;
      transition: opacity 0.55s ease;
    }
    body.fading {
      opacity: 0;
    }

    .outside {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: linear-gradient(180deg, #080c12 0%, #0e1520 60%, #111a24 100%);
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 40%, transparent 25%, #080c12 100%);
      pointer-events: none;
      z-index: 2;
    }

    /* ── who link top-right ── */
    .who-link {
      position: fixed;
      top: 1.4rem;
      right: 1.6rem;
      z-index: 20;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: lowercase;
      color: rgba(100,130,155,0.7);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      padding: 0.2rem 0.15rem;
      cursor: pointer;
      transition: color 0.3s, border-color 0.3s;
      opacity: 0;
      animation: fadeInUI 2s ease forwards;
      animation-delay: 0.5s;
    }

    .who-link:hover {
      color: rgba(150,185,215,0.88);
      border-bottom-color: rgba(120,160,200,0.35);
    }

    @keyframes fadeInUI {
      to { opacity: 1; }
    }

    /* ── now playing + volume ── */
    .top-left {
      position: fixed;
      top: 1.4rem;
      left: 1.6rem;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      opacity: 0;
      transition: opacity 2s ease;
    }
    .top-left.visible { opacity: 1; }

    .np-row {
      display: flex;
      align-items: center;
      gap: 0.55rem;
    }

    .np-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #607080;
      animation: pulse 3s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.9; }
    }

    .np-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.13em;
      color: #5a7080;
    }
    .np-title { color: #7a9ab0; }

    .vol-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding-left: 0.05rem;
    }

    .vol-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.14em;
      color: #4a6070;
      text-transform: lowercase;
      user-select: none;
    }

    .vol-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 70px;
      height: 2px;
      background: #2e4050;
      outline: none;
      border: none;
      border-radius: 2px;
      cursor: pointer;
    }

    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #607080;
      cursor: pointer;
      transition: background 0.2s;
    }

    .vol-slider::-webkit-slider-thumb:hover {
      background: rgba(160,200,240,0.8);
    }

    .vol-slider::-moz-range-thumb {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #607080;
      border: none;
      cursor: pointer;
    }

    /* ── main ── */
    .wrap {
      position: relative;
      z-index: 5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      padding: 2rem;
    }

    .sentence {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .static-word {
      font-family: 'IM Fell English', serif;
      font-size: clamp(2rem, 6vw, 3.6rem);
      font-weight: 400;
      color: rgba(200,215,235,0.75);
      letter-spacing: 0.04em;
    }

    .word-slot {
      min-width: 200px;
      display: flex;
      align-items: baseline;
      justify-content: center;
      overflow: hidden;
    }

    .word-display {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: clamp(2rem, 6vw, 3.6rem);
      font-weight: 400;
      color: rgba(160,200,240,0.9);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .word-display.spinning {
      animation: flicker 0.09s linear infinite;
    }

    @keyframes flicker {
      0%   { opacity: 1; }
      50%  { opacity: 0.1; }
      100% { opacity: 1; }
    }

    .divider {
      width: 36px;
      height: 1px;
      background: rgba(100,140,180,0.18);
    }

    .spin-btn {
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(100,140,180,0.25);
      color: rgba(100,140,180,0.55);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 400;
      letter-spacing: 0.28em;
      padding: 0.5rem 0.2rem;
      cursor: pointer;
      text-transform: lowercase;
      transition: color 0.3s, border-color 0.3s;
    }

    .spin-btn:hover {
      color: rgba(160,200,240,0.85);
      border-color: rgba(120,160,200,0.45);
    }

    .spin-btn.running {
      pointer-events: none;
      color: rgba(60,80,100,0.2);
      border-color: rgba(60,80,100,0.1);
    }

    /* ── branding ── */
    .branding {
      position: fixed;
      bottom: 1.4rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      color: #4a6070;
      text-transform: lowercase;
      white-space: nowrap;
      user-select: none;
    }
  </style>
</head>
<body>

  <div class="outside"></div>
  <canvas id="c"></canvas>
  <div class="vignette"></div>

  <!-- Who link -->
  <a class="who-link" id="whoLink" href="#">who</a>

  <div class="top-left" id="topLeft">
    <div class="np-row">
      <div class="np-dot"></div>
      <div class="np-text">now playing &nbsp;<span class="np-title">yesterday — vs self</span></div>
    </div>
    <div class="vol-row">
      <span class="vol-label">vol</span>
      <input class="vol-slider" type="range" min="0" max="1" step="0.01" value="0.8" id="vol">
    </div>
  </div>

  <div class="branding">rapture®</div>

  <audio id="audio" loop>
    <source src="https://raw.githubusercontent.com/newyork482/igotyoulol/main/music/song.mp3" type="audio/mpeg">
  </audio>
  <audio id="rain" loop>
    <source src="https://assets.mixkit.co/active_storage/sfx/2515/2515-preview.mp3" type="audio/mpeg">
  </audio>

  <div class="wrap">
    <div class="sentence">
      <span class="static-word">i got</span>
      <div class="word-slot">
        <span class="word-display" id="word">you</span>
      </div>
    </div>
    <div class="divider"></div>
    <button class="spin-btn" id="btn" onclick="spin()">again</button>
  </div>

  <script>
    // ── who link ──────────────────────────────────────────────
    document.getElementById('whoLink').addEventListener('click', function(e) {
      e.preventDefault();
      document.body.classList.add('fading');
      setTimeout(() => {
        window.location.href = 'who.html';
      }, 560);
    });

    // ── rain ──────────────────────────────────────────────────
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function newStreak(scatter) {
      const len = 15 + Math.random() * 35;
      return {
        x:     Math.random() * (W + 60) - 30,
        y:     scatter ? Math.random() * H : -len,
        len,
        speed: 6 + Math.random() * 10,
        alpha: 0.03 + Math.random() * 0.1,
        width: 0.4 + Math.random() * 0.7,
      };
    }

    const streaks = Array.from({ length: 140 }, () => newStreak(true));

    function animate() {
      ctx.clearRect(0, 0, W, H);
      streaks.forEach(s => {
        ctx.save();
        ctx.globalAlpha = s.alpha;
        ctx.strokeStyle = 'rgba(180,210,245,1)';
        ctx.lineWidth = s.width;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        ctx.lineTo(s.x - s.len * 0.12, s.y + s.len);
        ctx.stroke();
        ctx.restore();
        s.y += s.speed;
        s.x -= s.speed * 0.12;
        if (s.y - s.len > H || s.x < -60) Object.assign(s, newStreak(false));
      });
      requestAnimationFrame(animate);
    }
    animate();

    // ── words ──────────────────────────────────────────────────
    const words = [
      "you", "nobody", "nothing", "everything", "questions",
      "answers", "time", "chills", "feelings", "regrets",
      "memories", "secrets", "plans", "stories", "ideas",
      "patience", "no sleep", "no clue", "bad timing", "good news",
      "mixed signals", "second thoughts", "trust issues", "too much", "too little",
      "your back", "your attention", "your message", "your heart",
      "the vibe", "the memo", "the truth", "the answer", "the details",
      "the wrong idea", "the right idea", "the whole picture", "the upper hand",
      "a feeling", "a confession", "a theory", "a plan", "a point",
      "a lot going on", "a bad feeling", "a good feeling", "a reputation",
      "some nerve", "some thoughts", "some doubts", "some respect",
      "bad news", "good intentions", "high hopes", "low expectations",
      "something to say", "nowhere to hide", "one shot", "one chance",
      "all the time", "half a mind", "no idea", "every reason",
      "a lot to lose", "nothing to prove", "so much to say", "a long way to go",
      "all of it", "none of it", "most of it", "the best of it",
      "your number", "your energy", "your silence", "your timing",
      "the receipts", "the catch", "the plot twist", "the missing piece",
      "a wild card", "a head start", "a long way back", "a reason to stay",
      "soft spots", "loose ends", "old wounds", "new beginnings",
      "your password", "your frequency", "your location", "your version",
      "the last word", "the first move", "the upper hand", "the benefit of the doubt",
      "cold feet", "warm thoughts", "deep cuts", "second chances",
      "unfinished business"
    ];

    let current = "you";
    let spinning = false;
    let musicStarted = false;

    function spin() {
      if (spinning) return;
      spinning = true;

      if (!musicStarted) {
        audio.play().then(() => topLeft.classList.add('visible')).catch(() => {});
        rain.volume = 0.008;
        rain.play().catch(() => {});
        musicStarted = true;
      }

      const el  = document.getElementById('word');
      const btn = document.getElementById('btn');
      btn.classList.add('running');
      el.classList.add('spinning');
      const pool     = words.filter(w => w !== current);
      const next     = pool[Math.floor(Math.random() * pool.length)];
      const shuffled = [...pool].sort(() => Math.random() - 0.5);
      let ticks = 0;
      const total = 20 + Math.floor(Math.random() * 10);
      const interval = setInterval(() => {
        el.textContent = shuffled[ticks % shuffled.length];
        ticks++;
        if (ticks >= total) {
          clearInterval(interval);
          el.textContent = next;
          current = next;
          el.classList.remove('spinning');
          btn.classList.remove('running');
          spinning = false;
        }
      }, 70);
    }

    // ── audio + volume ─────────────────────────────────────────
    const audio    = document.getElementById('audio');
    const rain     = document.getElementById('rain');
    const topLeft  = document.getElementById('topLeft');
    const volSlider = document.getElementById('vol');

    audio.volume = 0.8;

    volSlider.addEventListener('input', () => {
      audio.volume = parseFloat(volSlider.value);
    });
    volSlider.addEventListener('change', () => {
      audio.volume = parseFloat(volSlider.value);
    });
  </script>
</body>
</html>
