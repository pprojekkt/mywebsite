<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>.pprojekkt</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    html, body {
      background: #050807;
      width: 100vw; height: 100vh;
      font-family: 'IBM Plex Mono', monospace;
      margin: 0; padding: 0;
      color: #fff;
      overflow: hidden;
    }
    .crt-bg {
      position:fixed; inset:0; pointer-events:none; z-index:0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(0,255,128,0.09) 0,
        rgba(0,255,128,0.07) 1.1px,
        transparent 3px,
        transparent 6.2px
      );
      opacity:.09; mix-blend-mode:screen;
    }
    .crt-scanline {
      position:fixed;left:0;right:0;
      height:2px;
      background:linear-gradient(90deg,transparent,#00FF80 73%,transparent);
      opacity:.10;top:33vh;
      animation:scan 5.8s linear infinite;
      z-index: 1;pointer-events:none;
      filter: blur(.85px);
      mix-blend-mode:screen
    }
    @keyframes scan {
      0% { top:0; }
      100% { top:100vh; }
    }
    .container {
      min-height:100vh;width:100vw;z-index:10;position:relative;
      display:flex;flex-direction:column; align-items:center; justify-content:center;
      box-shadow:0 0 55px #00ff8035 inset;
    }
    main {
      margin-top:1vw;
      display:flex;flex-direction:column;align-items:center;width:100vw;min-height:67vh;
    }
    .pprojekkt {
      font-size:clamp(1.95rem,7vw,3.5rem) !important;
      font-weight:700;
      color:#00FF80;
      letter-spacing:.07em;
      text-shadow: 0 0 19px #00ff80d7, 0 0 3.2px #3f8, 0 0 1.4px #fff9;
      margin-bottom:4.2rem; /* Increased separation from music player */
      margin-top:1.4vw;
      text-align:center;
      font-family:'IBM Plex Mono', monospace;
      user-select: all;
      line-height:1.2;
    }
    /* --- Music player --- */
    .music-player-wrap {
      background: rgba(5,18,11,0.93);
      border: 1.1px solid #00FF8011;
      border-radius: 7px;
      width: 300px; max-width: 94vw;
      margin: 1.6rem auto 0;            /* More top margin for extra separation */
      box-shadow: 0 0 10px #00ff8010;
      padding: 0.60rem 0.51rem 0.52rem;
      color: #00FF80;
      display: flex; flex-direction: column;
      align-items: flex-start;
      font-size:0.93em;
      margin-bottom: 3.2rem !important;
    }
    .music-meta {
      font-size:1.02em;font-weight: 700;margin: 0 0 .21em 0;letter-spacing: 0.03em;
      text-shadow: 0 0 10px #00ff80e5, 0 0 2.2px #3f8, 0 0 1px #fff7;
    }
    .music-controls {
      display:flex; gap:.36em; flex-direction:row;align-items:center;
      margin-bottom:0.02em;margin-top:0.01em;width:100%;justify-content:flex-start;
    }
    .music-controls button {
      font-family:'IBM Plex Mono', monospace;
      font-size:0.98em;
      padding:.10em 0.61em;
      background: transparent;
      color: #00FF80;
      border: 1px solid #00FF8017;
      border-radius:1.8px;
      margin-bottom:0.03em;
      margin-top:0.03em;
      cursor:pointer;line-height:1.12;height: 1.36em;min-width: 3.2em;
      letter-spacing:0.01em;white-space: nowrap;overflow: hidden;
      vertical-align:middle;box-sizing: border-box;text-align:center;
      display: flex;align-items: center;justify-content: center;
      transition: background .21s, color .13s, border-color .11s;
      text-shadow: 0 0 7px #00ff8049, 0 0 2.2px #3f8, 0 0 1.2px #fff6;
    }
    .music-controls button:disabled { opacity:.39;}
    .music-controls button:hover:not(:disabled) {
      background:rgba(0,255,128,0.19);color:#fff; border-color: #00FF80;
    }
    .music-player-progress {
      margin: 2px 0 7px 0;
      width: 100%; height: 5px;
      background: #03160c;
      border-radius:2px; position:relative; overflow:hidden;
    }
    .music-player-progress .fill {
      height:100%; background:linear-gradient(90deg,#00ff80 10%,#59ffb3 80%);
      width:0%;border-radius:2px;
      box-shadow: 0 0 3.5px #00ff802a;
      transition: width .1s linear;
    }
    .music-volume-wrap {
      display:flex; align-items:center;
      gap:.20em; margin:0 0 0.11em 0;
      font-size:.88em; color: #00FF80;
      text-shadow: 0 0 10px #00ff8080;
    }
    .music-volume-slider {
      appearance:none;width:54px;height:4px;
      background:#002518;border-radius:2px;
      margin:0 .11em; outline:none; cursor:pointer;
      box-shadow:0 0 2.4px #00ff803b inset;
    }
    .music-volume-slider::-webkit-slider-thumb {
      -webkit-appearance:none;appearance:none;
      width:8px;height:8px;border-radius:50%;
      background:#00FF80;
      box-shadow:0 0 1.8px #00FF80,0 0 1px #003a18;
      border:0; cursor:pointer; transition:background .12s;
    }
    .music-volume-slider::-moz-range-thumb {width:8px;height:8px;border-radius:50%;background:#00FF80;cursor:pointer;}
    .music-volume-slider:focus {outline:1px solid #00FF80;}
    .music-playlist {
      display:flex; gap:.18em; flex-wrap:wrap;margin-top:2px;
    }
    .music-playlist button {
      background:transparent; color:#00FF80;
      padding:.02em 0.55em;
      border:1px solid #00FF8015;
      border-radius:1.5px;
      cursor:pointer;font-size:.94em;
      margin-bottom:2px;transition:background.11s;
      font-family:'IBM Plex Mono',monospace;
      min-width:1.4em;text-align:center;
      text-shadow: 0 0 9.5px #00ff80b2, 0 0 1.7px #3f8;
    }
    .music-playlist button.active,
    .music-playlist button:hover:not(:disabled) {
      background: #00FF80; color: #001415;
    }
    .music-playlist button:disabled {opacity:.26;}
    /* --- Visit counter --- */
    .visit-counter {
      font-size: .83rem; color: #00FF80bd; background: #071a12c4;
      border: 1px solid #00ff8009; border-radius:5px;
      padding: .08em 0.61em; letter-spacing: .03em;
      font-family:'IBM Plex Mono', monospace; user-select: all; text-align:center;
      min-width:54px; opacity:.92;
      position:fixed;top:13px;right:15px;z-index:12;
      text-shadow: 0 0 6.2px #00ff80ba;
    }
    .digital-clock-gadget {
      position: fixed; left: 13px; bottom: 14px; z-index: 14;
      background: #000e08e8; border: 1.0px solid #00FF800E;
      border-radius: 5px; padding: 5px 11px 3px;
      color: #00FF80; font-family: 'IBM Plex Mono', monospace;
      font-size: 1.06em; box-shadow: 0 0 7px #00ff801c;
      text-shadow: 0 0 13px #00ff80c0, 0 0 3px #fff5, 0 0 2px #3f8;
      letter-spacing: .11em; opacity:.94; user-select: all; text-align:center; min-width:70px;
    }
    .emulator-window {
      position:fixed; bottom:25px; right:26px;
      width:400px; /* was 510px */
      height:266px; /* aspect for Wolf3D: 320x224 = 400x280, but a touch less */
      background: #181e1b;
      border: 1.5px solid #00FF801e;
      border-radius:10px;
      box-shadow:0 0 25px #00FF8043, 0 2px 13px #1a1f1b;
      z-index:990; padding: 0; min-width:140px; min-height:90px;
      filter:none; pointer-events:auto;display:flex;
      flex-direction:column;align-items:center;justify-content:flex-start;
      /* Added transition for nice resizing. */
      transition: width .25s, height .25s;
    }
    .emu-titlebar {
      width:100%;height:32px;cursor:default;
      background: #171c1a; color: #00FF80;font-family:inherit;
      font-size:1.19em;font-weight:700;letter-spacing:.08em;
      border-radius: 10px 10px 0 0;
      display:flex;align-items:center;justify-content:center;
      user-select:none;border-bottom:1px solid #00FF8018;
      padding-top: 2px; min-height:unset;
      text-shadow: 0 0 15px #00ff8091;
    }
    .emulator-area {
      width:99%;height:180px;
      align-items:center;justify-content:center;
      background: #131a12; border-radius:9px; margin: 0 0 0 0;
      padding:0; box-shadow:0 0 11px #00FF803d inset;
      display:flex;overflow:hidden; position:relative;
      min-width:100px; min-height:70px;
    }
    .emu-keybinds {
      width:99%;text-align:center;
      margin: 2px 0 0 0;color:#00FF80;
      font-size: .90em;font-family:inherit;opacity:.69;
      font-weight:600; letter-spacing: .04em;background: none;border: none;user-select: all;padding:0;
      text-shadow: 0 0 9px #00ff80b5;
    }
    .branding {
      position:fixed;bottom:8px;left:0;right:0;text-align:center;z-index:23;font-family:'IBM Plex Mono', monospace;
      font-size: .73rem;
      color:#00FF8070;
      letter-spacing: 0.14em;
      user-select: none;
      text-shadow: 0 0 1.7px #00ff8092;
      pointer-events: none;
    }
    /* --- Mobile/Responsive for Emulator --- */
    @media (max-width: 800px) {
      .music-player-wrap {width:97vw}
      .emulator-window {
        right:1vw;
        bottom:2vw;
        width:98vw;
        height:54vw;
        min-width:80vw; min-height:36vw;
        max-width:99vw; max-height:62vw;
      }
      .digital-clock-gadget {left:1vw;bottom:3vw;}
      .emulator-area {min-width:60vw; min-height:28vw;}
    }
  </style>
</head>
<body>
  <div class="crt-bg"></div>
  <div class="crt-scanline"></div>
  <div class="container">
    <main>
      <div class="pprojekkt">.pprojekkt</div>
      <!-- Music Player -->
      <div class="music-player-wrap" id="musicPlayer">
        <div class="music-meta" id="musicMeta"></div>
        <div class="music-controls">
          <button id="prevBtn" title="Previous">[prev]</button>
          <button id="playPauseBtn" title="Play">[play]</button>
          <button id="nextBtn" title="Next">[next]</button>
          <span id="musicTime" style="flex:1;text-align:right;min-width:2.3em;">0:00</span>
        </div>
        <div class="music-volume-wrap">
          <span style="font-size:.83em;letter-spacing:0.05em;opacity:0.7;">vol-</span>
          <input type="range" min="0" max="1" step="0.01" value="1" class="music-volume-slider" id="musicVolume">
          <span style="font-size:.83em;letter-spacing:0.05em;opacity:0.7;">vol+</span>
        </div>
        <div class="music-player-progress">
          <div class="fill" id="musicProgress"></div>
        </div>
        <div class="music-playlist" id="musicPlaylist"></div>
        <audio id="audio" preload="metadata"></audio>
      </div>
    </main>
  </div>
  <div class="visit-counter" id="visitCounter"></div>
  <div class="digital-clock-gadget" id="digitalClock"></div>

  <!-- Wolfenstein 3D via js-dos -->
  <div class="emulator-window" id="wolf3dWindow" style="touch-action:none;">
    <div class="emu-titlebar">Wolfenstein 3D</div>
    <div class="emulator-area" id="wolf3d-dos-area" style="background:#000; min-width:100px; min-height:70px;">
      <!-- js-dos will inject the canvas here -->
    </div>
    <div class="emu-keybinds">
      Controls: [Arrows/WASD]=Move [Ctrl]=Fire [Alt]=Open [M]=Music [Tab]=Map
      <br>
      Works on desktop and mobile (touch controls enabled automatically).
    </div>
  </div>
  <div class="branding">rapture®</div>
  <script>
    // Visit counter
    let vc = localStorage.getItem('pprojekkt_visits');
    vc = vc ? +vc+1 : 1;
    localStorage.setItem('pprojekkt_visits',vc);
    document.getElementById('visitCounter').textContent="VISITS: " + vc;

    // Digital clock UTC+3
    function pad(n){return n<10?"0"+n:n;}
    function updateClock() {
      const d = new Date();
      let h = d.getUTCHours() + 3;
      let m = d.getUTCMinutes();
      let s = d.getUTCSeconds();
      if(h >= 24) h -= 24;
      document.getElementById('digitalClock').textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
    }
    setInterval(updateClock, 950); updateClock();

    // Music Player logic (unchanged)
    const audio = document.getElementById("audio");
    const playPauseBtn = document.getElementById("playPauseBtn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const metaEl = document.getElementById("musicMeta");
    const progressEl = document.getElementById("musicProgress");
    const playlistEl = document.getElementById("musicPlaylist");
    const musicTime = document.getElementById("musicTime");
    const volumeSlider = document.getElementById("musicVolume");
    const musicLibrary = [
      {
        title: "A Star Called the Sun",
        artist: "Kino",
        src: "https://raw.githubusercontent.com/pprojekkt/mywebsite/main/music/AStarCalledtheSun.mp3",
      },
      {
        title: "Homage",
        artist: "Mild High Club",
        src: "https://raw.githubusercontent.com/pprojekkt/mywebsite/main/music/Homage.mp3",
      },
      {
        title: "Aerie",
        artist: "Lena Raine",
        src: "https://raw.githubusercontent.com/pprojekkt/mywebsite/main/music/Aerie.mp3",
      },
      {
        title: "Main Theme (Max Payne)",
        artist: "Kärtsy Hatakka & Kimmo Kajasto",
        src: "https://raw.githubusercontent.com/pprojekkt/mywebsite/main/music/Max Payne Main Theme.mp3",
      },
      {
        title: "Down Under",
        artist: "Men At Work",
        src: "https://raw.githubusercontent.com/pprojekkt/mywebsite/main/music/Down Under.mp3",
      },
      {
        title: "Char (Sped Up)",
        artist: "Crystal Castles",
        src: "https://raw.githubusercontent.com/pprojekkt/mywebsite/main/music/char.mp3"
      }
    ];
    let currentTrack = 0;
    function updateMeta(idx) {
      const t = musicLibrary[idx];
      if (!t || !t.src) {
        metaEl.textContent = "— no song loaded —";
        playPauseBtn.disabled = true;
      } else {
        metaEl.textContent = `${t.title} by ${t.artist}`;
        playPauseBtn.disabled = false;
      }
      Array.from(playlistEl.children).forEach((btn,i) => {
        btn.classList.toggle("active", i===idx);
      });
    }
    function updateProgress() {
      if (audio.duration) {
        progressEl.style.width = ((audio.currentTime/audio.duration)*100).toFixed(1)+"%";
        const min = Math.floor(audio.currentTime/60), sec = String(Math.floor(audio.currentTime%60)).padStart(2,'0');
        musicTime.textContent = `${min}:${sec}`;
      } else {
        progressEl.style.width = "0%";
        musicTime.textContent = '0:00';
      }
    }
    function playTrack(idx){
      if (!musicLibrary[idx].src) return;
      audio.src = musicLibrary[idx].src;
      audio.play().catch(()=>{});
      updateMeta(idx);
      currentTrack=idx;
    }
    playlistEl.innerHTML = "";
    musicLibrary.forEach((t,i)=>{
      const btn = document.createElement("button");
      btn.textContent = t.title;
      btn.disabled = !t.src;
      btn.onclick = ()=>playTrack(i);
      playlistEl.appendChild(btn);
    });
    updateMeta(currentTrack);
    playPauseBtn.onclick = ()=>{
      if (!audio.src) playTrack(currentTrack);
      else if (audio.paused) audio.play();
      else audio.pause();
    };
    prevBtn.onclick=()=>{
      let prev = (currentTrack-1+musicLibrary.length)%musicLibrary.length;
      while (!musicLibrary[prev].src && prev!==currentTrack) prev = (prev-1+musicLibrary.length)%musicLibrary.length;
      playTrack(prev);
    };
    nextBtn.onclick=()=>{
      let next = (currentTrack+1)%musicLibrary.length;
      while (!musicLibrary[next].src && next!==currentTrack) next = (next+1)%musicLibrary.length;
      playTrack(next);
    };
    audio.addEventListener("playing", ()=>{ playPauseBtn.innerHTML = "[play]"; });
    audio.addEventListener("pause", ()=>{ playPauseBtn.innerHTML = "[play]"; });
    audio.addEventListener("ended", ()=>{ nextBtn.click(); });
    audio.addEventListener("loadedmetadata",updateProgress);
    audio.addEventListener("timeupdate",updateProgress);
    volumeSlider.addEventListener("input", function() {
      audio.volume = this.valueAsNumber;
    });
    audio.volume = volumeSlider.valueAsNumber;
    progressEl.parentElement.addEventListener("click", function(e){
      if (!audio.src) return;
      const rect = this.getBoundingClientRect();
      const pct = (e.clientX-rect.left)/rect.width;
      if (!isNaN(audio.duration)) audio.currentTime = pct*audio.duration;
    });
    updateProgress();
  </script>
  <!-- js-dos library -->
  <script src="https://js-dos.com/6.22/current/js-dos.js"></script>
  <script>
    (async function() {
      const dosBoxDiv = document.getElementById("wolf3d-dos-area");
      const ci = await Dos(dosBoxDiv, {
        w: dosBoxDiv.offsetWidth || 400,
        h: dosBoxDiv.offsetHeight || 180,
        autolock: true
      });
      ci.run("https://js-dos.com/cdn/wolf3d.jsdos");
      function resizeDosArea() {
        // Height logic matches (aspect ratio is 320/224 or 1.428...)
        let maxWidth = 400;
        let width = Math.min(window.innerWidth * 0.96, maxWidth);
        let height = width * 224 / 320;
        if (window.innerWidth < 800) {
          width = window.innerWidth * 0.98;
          height = width * 224 / 320;
        }
        dosBoxDiv.style.width = width + "px";
        dosBoxDiv.style.height = height + "px";
        if (ci.ui && ci.ui.screen)
          ci.ui.screen.setSize(width, height);
      }
      window.addEventListener('resize', resizeDosArea);
      resizeDosArea();
    })();
  </script>
</body>
</html>
